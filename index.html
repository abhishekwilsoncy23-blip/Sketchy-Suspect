<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sketchy Suspect</title>
    <style>
        :root {
            --primary: #FF4757;
            --bg: #2F3542;
            --text: #F1F2F6;
            --card: #57606F;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .screen {
            display: none;
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-sizing: border-box;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .screen.active {
            display: block;
        }
        h1, h2 { margin-top: 0; }
        input[type="text"] {
            padding: 12px;
            width: 80%;
            border-radius: 6px;
            border: none;
            margin-bottom: 10px;
            font-size: 16px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        button:active { background-color: #ff6b81; }
        #player-list { list-style: none; padding: 0; margin-bottom: 20px;}
        #player-list li { background: #747d8c; margin: 5px; padding: 10px; border-radius: 6px; }
        
        canvas {
            background: white;
            border-radius: 8px;
            touch-action: none; /* Prevents scrolling while drawing on mobile */
            cursor: crosshair;
            margin-bottom: 10px;
        }
        
        #gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .gallery-item img {
            max-width: 100%;
            background: white;
            border-radius: 8px;
            border: 4px solid var(--primary);
        }
        .secret-text {
            font-size: 24px;
            font-weight: bold;
            color: #ffa502;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <h1>Sketchy Suspect</h1>
        <p>Enter at least 3 players to start!</p>
        <input type="text" id="player-name" placeholder="Enter player name">
        <button onclick="addPlayer()">Add Player</button>
        <ul id="player-list"></ul>
        <button onclick="startGame()" style="background-color: #2ed573;">Start Game</button>
    </div>

    <div id="pass-screen" class="screen">
        <h2>Pass the phone to:</h2>
        <h1 id="pass-target-name" style="color: #1e90ff;">Name</h1>
        <p>Make sure no one else is looking!</p>
        <button onclick="revealAction()">I am ready</button>
    </div>

    <div id="role-screen" class="screen">
        <h2 id="role-player-name">Name</h2>
        <p>Your secret role/prompt is:</p>
        <div class="secret-text" id="secret-role-text"></div>
        <button onclick="hideAndNext()">Hide & Continue</button>
    </div>

    <div id="draw-screen" class="screen">
        <h2 id="draw-player-name">Name, it's your turn to draw!</h2>
        <canvas id="drawing-board" width="300" height="300"></canvas>
        <br>
        <button onclick="clearCanvas()" style="background-color: #a4b0be;">Clear</button>
        <button onclick="submitDrawing()">Submit Drawing</button>
    </div>

    <div id="reveal-screen" class="screen">
        <h1>Time to Vote!</h1>
        <p>Who is the imposter?</p>
        <div id="gallery"></div>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        // --- GAME STATE ---
        const stories = ["A dog flying a spaceship", "A dinosaur eating a pizza", "A ninja playing tennis", "A snowman on fire"];
        let players = [];
        let currentPhase = "roles"; // 'roles' or 'drawing'
        let currentPlayerIndex = 0;

        // --- DOM ELEMENTS ---
        const screens = {
            setup: document.getElementById('setup-screen'),
            pass: document.getElementById('pass-screen'),
            role: document.getElementById('role-screen'),
            draw: document.getElementById('draw-screen'),
            reveal: document.getElementById('reveal-screen')
        };

        // --- SETUP LOGIC ---
        function addPlayer() {
            const nameInput = document.getElementById('player-name');
            const name = nameInput.value.trim();
            if (name) {
                players.push({ name: name, role: "", drawing: null });
                const li = document.createElement('li');
                li.innerText = name;
                document.getElementById('player-list').appendChild(li);
                nameInput.value = '';
            }
        }

        function startGame() {
            if (players.length < 3) {
                alert("You need at least 3 players!");
                return;
            }
            
            // Assign roles
            const randomStory = stories[Math.floor(Math.random() * stories.length)];
            const imposterIndex = Math.floor(Math.random() * players.length);
            
            players.forEach((player, index) => {
                if (index === imposterIndex) {
                    player.role = "YOU ARE THE IMPOSTER! Fake it!";
                } else {
                    player.role = `Story: ${randomStory}`;
                }
            });

            currentPlayerIndex = 0;
            currentPhase = "roles";
            showScreen('pass');
            updatePassScreen();
        }

        // --- FLOW CONTROLLERS ---
        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function updatePassScreen() {
            document.getElementById('pass-target-name').innerText = players[currentPlayerIndex].name;
        }

        function revealAction() {
            if (currentPhase === "roles") {
                document.getElementById('role-player-name').innerText = players[currentPlayerIndex].name;
                document.getElementById('secret-role-text').innerText = players[currentPlayerIndex].role;
                showScreen('role');
            } else if (currentPhase === "drawing") {
                document.getElementById('draw-player-name').innerText = players[currentPlayerIndex].name;
                clearCanvas();
                showScreen('draw');
            }
        }

        function hideAndNext() {
            currentPlayerIndex++;
            if (currentPlayerIndex >= players.length) {
                // Done with roles, move to drawing
                currentPlayerIndex = 0;
                currentPhase = "drawing";
            }
            showScreen('pass');
            updatePassScreen();
        }

        // --- CANVAS LOGIC ---
        const canvas = document.getElementById('drawing-board');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startPosition(e) {
            isDrawing = true;
            draw(e);
        }

        function endPosition() {
            isDrawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); // Prevents screen scrolling on touch
            const coords = getCoords(e);
            
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';

            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
        }

        // Mouse Events
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', draw);
        // Touch Events for Mobile
        canvas.addEventListener('touchstart', startPosition, {passive: false});
        canvas.addEventListener('touchend', endPosition);
        canvas.addEventListener('touchmove', draw, {passive: false});

        function clearCanvas() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
        }

        function submitDrawing() {
            // Save the image data
            players[currentPlayerIndex].drawing = canvas.toDataURL();
            
            currentPlayerIndex++;
            if (currentPlayerIndex >= players.length) {
                // Everyone has drawn!
                showFinalReveal();
            } else {
                showScreen('pass');
                updatePassScreen();
            }
        }

        // --- FINAL REVEAL ---
        function showFinalReveal() {
            showScreen('reveal');
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = ''; // Clear previous

            // Shuffle the players array so the order is random (harder to guess!)
            const shuffledPlayers = [...players].sort(() => Math.random() - 0.5);

            shuffledPlayers.forEach(player => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <h3>${player.name}</h3>
                    <img src="${player.drawing}" alt="${player.name}'s drawing">
                `;
                gallery.appendChild(div);
            });
        }
    </script>
</body>
</html>
