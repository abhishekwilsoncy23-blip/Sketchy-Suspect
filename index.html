<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jungle Rescue: HD Arcade</title>
    <style>
        body { margin: 0; background: #020502; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
        canvas { background: #0d1a0d; image-rendering: pixelated; border: 6px solid #2d4a2d; border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const TILE_SIZE = 40;
const GRID_W = 20; 
const GRID_H = 12;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = "PLAYING";
let hasKey = false;
const sprites = {};

function createHighDetailSprites() {
    const sCanvas = document.createElement('canvas');
    const sCtx = sCanvas.getContext('2d');
    sCanvas.width = TILE_SIZE; sCanvas.height = TILE_SIZE;

    const drawToSprite = (name, drawFn) => {
        sCtx.clearRect(0,0,40,40);
        drawFn(sCtx);
        const img = new Image();
        img.src = sCanvas.toDataURL();
        sprites[name] = img;
    };

    // --- REAL GRASS TILE ---
    drawToSprite('foliage', c => {
        c.fillStyle = '#2d5a27'; c.fillRect(0,0,40,40); // Base Dark Green
        c.fillStyle = '#3d7a36'; // Mid Green blades
        for(let i=0; i<40; i++) c.fillRect(Math.random()*36, Math.random()*36, 2, 4);
        c.fillStyle = '#4ea345'; // Highlights
        for(let i=0; i<15; i++) c.fillRect(Math.random()*36, Math.random()*36, 1, 2);
    });

    // --- REAL STONE (BOULDER) ---
    drawToSprite('stone', c => {
        c.fillStyle = '#444'; c.beginPath(); c.arc(20,22,18,0,7); c.fill(); // Shadow
        c.fillStyle = '#777'; c.beginPath(); c.arc(20,20,17,0,7); c.fill(); // Body
        c.fillStyle = '#999'; c.beginPath(); c.arc(14,14,10,0,7); c.fill(); // Light side
        c.strokeStyle = '#333'; c.lineWidth = 1; c.strokeRect(10,25,5,2); // Cracks
    });

    // --- JUNGLE TREE (WALL) ---
    drawToSprite('tree', c => {
        c.fillStyle = '#1a331a'; c.fillRect(0,0,40,40);
        c.fillStyle = '#0f260f'; // Leaf clusters
        c.beginPath(); c.arc(10,10,12,0,7); c.arc(30,10,12,0,7); c.arc(20,30,15,0,7); c.fill();
        c.fillStyle = '#274d27'; // Top highlight
        c.beginPath(); c.arc(20,15,10,0,7); c.fill();
    });

    // --- ARCADE CHARACTER (EXPLORER) ---
    drawToSprite('hero', c => {
        c.fillStyle = '#5d4037'; c.fillRect(10,22,20,12); // Shirt/Vest
        c.fillStyle = '#ffdbac'; c.fillRect(12,10,16,14); // Face
        c.fillStyle = '#222'; c.fillRect(14,15,2,2); c.fillRect(24,15,2,2); // Eyes
        c.fillStyle = '#795548'; c.fillRect(6,8,28,4); // Hat Rim
        c.fillRect(10,2,20,8); // Hat Top
        c.fillStyle = '#3e2723'; c.fillRect(10,34,8,6); c.fillRect(22,34,8,6); // Boots
    });

    // --- KEY & WATER ---
    drawToSprite('key', c => {
        c.fillStyle = '#ffd700'; c.fillRect(18,10,4,20); c.fillRect(14,10,12,6); // Gold Key
    });
    drawToSprite('water', c => {
        c.fillStyle = '#1e88e5'; c.fillRect(0,0,40,40);
        c.fillStyle = '#bbdefb'; c.fillRect(5,15,15,2); c.fillRect(20,25,10,2); // Waves
    });
}
createHighDetailSprites();

// [Insert the rest of the Move, Physics, and Draw logic from previous message]
// Logic remains same, but draw() calls these new high-detail sprites.
</script>
<script src="level1.js"></script>
</body>
</html>
