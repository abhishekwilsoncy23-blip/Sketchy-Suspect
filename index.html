<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rescue Rush</title>
    <style>
        body { margin: 0; background: #020502; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        #gameContainer { position: relative; }
        canvas { background: #0d1a0d; image-rendering: pixelated; border: 4px solid #2d4a2d; box-shadow: 0 0 20px rgba(0,0,0,0.5); display: block; }
        
        /* UI Overlay */
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; }
        .panel { background: rgba(0,0,0,0.85); padding: 20px; border: 2px solid #fff; border-radius: 10px; pointer-events: auto; }
        h1 { color: #ffd700; margin-top: 0; font-size: 32px; text-transform: uppercase; }
        button { background: #2d5a27; color: white; border: 2px solid #4ade80; padding: 10px 20px; font-size: 18px; cursor: pointer; font-family: inherit; margin: 5px; border-radius: 5px; }
        button:active { background: #1b4d1b; }
        #btnPause { position: absolute; top: 10px; right: 10px; padding: 5px 10px; font-size: 14px; pointer-events: auto; }

        /* Mobile D-PAD */
        #mobileControls { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px; display: none; pointer-events: auto; }
        .dpad-btn { position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.6); border-radius: 5px; color: white; font-weight: bold; line-height: 36px; text-align: center; user-select: none; }
        .dpad-btn:active { background: rgba(255,255,255,0.6); }
        #up { top: 0; left: 40px; } #down { bottom: 0; left: 40px; }
        #left { top: 40px; left: 0; } #right { top: 40px; right: 0; }
        
        @media (max-width: 768px) { #mobileControls { display: block; } } /* Show D-Pad on mobile */
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <button id="btnPause" style="display:none;" onclick="togglePause()">PAUSE</button>
    
    <div id="uiLayer">
        <div id="mainMenu" class="panel">
            <h1>Rescue Rush</h1>
            <p>Use Arrows or D-Pad to move.</p>
            <p>Push stones, avoid Fire & Snakes!</p>
            <button onclick="startGame()">PLAY</button>
        </div>
        <div id="messageScreen" class="panel" style="display:none;">
            <h1 id="msgTitle">Game Over</h1>
            <button onclick="location.reload()">RESTART LEVEL</button>
        </div>
    </div>

    <div id="mobileControls">
        <div class="dpad-btn" id="up">U</div>
        <div class="dpad-btn" id="down">D</div>
        <div class="dpad-btn" id="left">L</div>
        <div class="dpad-btn" id="right">R</div>
    </div>
</div>

<script src="level1.js"></script>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const TILE_SIZE = 40;
const VIEW_W = 16; // Visible tiles width (16:9 ratio)
const VIEW_H = 9;  // Visible tiles height
canvas.width = VIEW_W * TILE_SIZE; // 640
canvas.height = VIEW_H * TILE_SIZE; // 360

let gameState = "MENU"; // MENU, PLAYING, PAUSED, GAMEOVER, WIN
let hasKey = false;
let player = window.playerPos || { x: 1, y: 1 };
let level = window.currentLevel || [];
let camX = 0, camY = 0;
let tickCounter = 0;

// --- SPRITE GENERATOR ---
const sprites = {};
function createSprites() {
    const sCanvas = document.createElement('canvas');
    const sCtx = sCanvas.getContext('2d');
    sCanvas.width = 40; sCanvas.height = 40;

    const generate = (name, drawFn) => {
        sCtx.clearRect(0,0,40,40);
        drawFn(sCtx);
        const img = new Image();
        img.src = sCanvas.toDataURL();
        sprites[name] = img;
    };

    generate('grass', c => {
        c.fillStyle = '#2d5a27'; c.fillRect(0,0,40,40);
        for(let i=0; i<60; i++) {
            c.fillStyle = Math.random() > 0.5 ? '#3d7a36' : '#1e3d1a';
            c.fillRect(Math.random()*38, Math.random()*38, 2, 4);
        }
    });
    generate('stone', c => {
        c.fillStyle = '#444'; c.beginPath(); c.arc(20,22,18,0,7); c.fill();
        c.fillStyle = '#7a7a7a'; c.beginPath(); c.arc(20,20,17,0,7); c.fill();
        c.fillStyle = '#ababab'; c.beginPath(); c.arc(14,14,8,0,7); c.fill();
    });
    generate('tree', c => {
        c.fillStyle = '#0a1a0a'; c.fillRect(0,0,40,40);
        c.fillStyle = '#1b4d1b'; c.beginPath(); c.arc(20,20,18,0,7); c.fill();
        c.fillStyle = '#2d5a27'; c.beginPath(); c.arc(15,15,10,0,7); c.fill();
    });
    generate('hero', c => {
        c.fillStyle = '#ffdbac'; c.fillRect(12,10,16,14);
        c.fillStyle = '#5d4037'; c.fillRect(10,22,20,12);
        c.fillStyle = '#795548'; c.fillRect(6,8,28,4); c.fillRect(10,2,20,8);
        c.fillStyle = '#222'; c.fillRect(14,15,2,2); c.fillRect(24,15,2,2);
    });
    generate('key', c => { c.fillStyle='#ffd700'; c.fillRect(18,10,4,20); c.fillRect(14,10,12,6); });
    generate('water', c => { 
        c.fillStyle='#1e88e5'; c.fillRect(0,0,40,40);
        c.fillStyle='#bbdefb'; c.fillRect(5,15,15,2); c.fillRect(20,25,10,2);
    });
    generate('fire', c => {
        c.fillStyle='#d84315'; c.beginPath(); c.arc(20,25,12,0,7); c.fill();
        c.fillStyle='#ff9800'; c.beginPath(); c.arc(20,28,8,0,7); c.fill();
        c.fillStyle='#ffeb3b'; c.beginPath(); c.arc(20,30,4,0,7); c.fill();
    });
    generate('snake', c => {
        c.fillStyle='#4caf50'; c.fillRect(10,20,20,10); // body
        c.fillStyle='#388e3c'; c.fillRect(15,15,15,15); // head
        c.fillStyle='red'; c.fillRect(30,20,6,2); // tongue
        c.fillStyle='white'; c.fillRect(22,18,4,4); // eye
        c.fillStyle='black'; c.fillRect(24,19,2,2); // pupil
    });
}
createSprites();

// --- GAME LOGIC ---
function startGame() {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('btnPause').style.display = 'block';
    gameState = "PLAYING";
}

function togglePause() {
    if (gameState === "PLAYING") {
        gameState = "PAUSED";
        showScreen("Game Paused");
    } else if (gameState === "PAUSED") {
        document.getElementById('messageScreen').style.display = 'none';
        gameState = "PLAYING";
    }
}

function showScreen(text) {
    document.getElementById('messageScreen').style.display = 'block';
    document.getElementById('msgTitle').innerText = text;
    document.getElementById('btnPause').style.display = 'none';
}

function updateCamera() {
    let mapW = level[0].length;
    let mapH = level.length;
    // Center camera on player, clamp to map edges
    camX = Math.max(0, Math.min(player.x - Math.floor(VIEW_W / 2), mapW - VIEW_W));
    camY = Math.max(0, Math.min(player.y - Math.floor(VIEW_H / 2), mapH - VIEW_H));
}

function move(dx, dy) {
    if (gameState !== "PLAYING") return;
    let nx = player.x + dx, ny = player.y + dy;
    
    // Bounds check
    if(ny < 0 || ny >= level.length || nx < 0 || nx >= level[0].length) return;

    let target = level[ny][nx];

    if (target === 1 || target === 5) return; // Walls/Water
    if (target === 7 || target === 8) { // Fire or Snake (Death)
        gameState = "GAMEOVER";
        showScreen("Burned or Bitten! GAME OVER");
        return;
    }
    if (target === 3 && dy === 0) { // Push stone horizontally
        if (level[ny][nx+dx] === 0) { level[ny][nx+dx]=3; level[ny][nx]=0; } else return;
    } else if (target === 3) return; // Can't push up/down

    if (target === 4) {
        if(hasKey) { 
            gameState = "WIN"; 
            showScreen("LEVEL CLEAR!");
            return; 
        } else return; // Door locked
    }
    if (target === 6) { hasKey = true; }

    level[ny][nx] = 0; // Dig grass / clear key
    player.x = nx; player.y = ny;
}

function updatePhysics() {
    if (gameState !== "PLAYING") return;
    tickCounter++;
    
    let mapW = level[0].length;
    let mapH = level.length;

    // Gravity for Stones (Bottom to Top loop)
    for (let y = mapH - 2; y >= 0; y--) {
        for (let x = 0; x < mapW; x++) {
            if (level[y][x] === 3 && level[y+1][x] === 0) {
                level[y][x] = 0; level[y+1][x] = 3;
                if (player.x === x && player.y === y + 1) {
                    gameState = "GAMEOVER";
                    showScreen("CRUSHED! GAME OVER");
                }
            }
        }
    }
    
    // Optional: Simple Snake Patrol Logic (Moves back and forth every 5 ticks)
    if(tickCounter % 5 === 0) {
        for (let y = 0; y < mapH; y++) {
            for (let x = 0; x < mapW; x++) {
                if(level[y][x] === 8) {
                    // Try to move left or right randomly if empty
                    let dir = Math.random() > 0.5 ? 1 : -1;
                    if(x+dir >= 0 && x+dir < mapW && level[y][x+dir] === 0) {
                        level[y][x] = 0;
                        level[y][x+dir] = 8; // Move snake
                        if (player.x === x+dir && player.y === y) {
                            gameState = "GAMEOVER"; showScreen("Bitten! GAME OVER");
                        }
                    }
                }
            }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    updateCamera();

    // Draw only visible map section
    for (let y = 0; y < VIEW_H; y++) {
        for (let x = 0; x < VIEW_W; x++) {
            let mapX = camX + x;
            let mapY = camY + y;
            
            if(mapY >= level.length || mapX >= level[0].length) continue;

            let t = level[mapY][mapX];
            let px = x * TILE_SIZE, py = y * TILE_SIZE;

            if (t === 1) ctx.drawImage(sprites.tree, px, py);
            if (t === 2) ctx.drawImage(sprites.grass, px, py);
            if (t === 3) ctx.drawImage(sprites.stone, px, py);
            if (t === 5) ctx.drawImage(sprites.water, px, py);
            if (t === 6) ctx.drawImage(sprites.key, px, py);
            if (t === 7) ctx.drawImage(sprites.fire, px, py);
            if (t === 8) ctx.drawImage(sprites.snake, px, py);
            if (t === 4) {
                ctx.fillStyle = hasKey ? "#4ade80" : "#d84315";
                ctx.fillRect(px+10, py+10, 20, 20); // Door
                ctx.strokeStyle = "#fff"; ctx.strokeRect(px+10,py+10,20,20);
            }
        }
    }
    
    // Draw Player (relative to camera)
    let drawPlayerX = (player.x - camX) * TILE_SIZE;
    let drawPlayerY = (player.y - camY) * TILE_SIZE;
    if(drawPlayerX >= 0 && drawPlayerX < canvas.width && drawPlayerY >= 0 && drawPlayerY < canvas.height) {
        ctx.drawImage(sprites.hero, drawPlayerX, drawPlayerY);
    }
}

// --- INPUTS (Cross Platform) ---
window.addEventListener('keydown', e => {
    if(e.key === 'ArrowUp') move(0,-1);
    if(e.key === 'ArrowDown') move(0,1);
    if(e.key === 'ArrowLeft') move(-1,0);
    if(e.key === 'ArrowRight') move(1,0);
});

// Mobile Controls D-Pad setup
const attachBtn = (id, dx, dy) => {
    const btn = document.getElementById(id);
    const trigger = (e) => { e.preventDefault(); move(dx, dy); };
    btn.addEventListener('touchstart', trigger);
    btn.addEventListener('mousedown', trigger);
};
attachBtn('up', 0, -1);
attachBtn('down', 0, 1);
attachBtn('left', -1, 0);
attachBtn('right', 1, 0);


// Loop
setInterval(() => {
    updatePhysics();
    draw();
}, 100);

// Scaling to fit screen properly while maintaining 16:9 ratio
function resize() {
    let scale = Math.min(window.innerWidth/640, window.innerHeight/360);
    let finalWidth = 640 * scale;
    let finalHeight = 360 * scale;
    canvas.style.width = finalWidth + "px";
    canvas.style.height = finalHeight + "px";
    
    // Keep UI layer matched to canvas dimensions
    let uiLayer = document.getElementById('uiLayer');
    uiLayer.style.width = finalWidth + "px";
    uiLayer.style.height = finalHeight + "px";
    uiLayer.style.left = (window.innerWidth - finalWidth) / 2 + "px";
    uiLayer.style.top = (window.innerHeight - finalHeight) / 2 + "px";
}
window.onresize = resize; resize();
</script>
</body>
</html>
