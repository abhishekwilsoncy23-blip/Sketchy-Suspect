<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jungle Rescue: Arcade</title>
    <style>
        body { margin: 0; background: #050a05; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
        canvas { background: #1a2e1a; image-rendering: pixelated; border: 4px solid #3e5a3e; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
// --- Configuration ---
const TILE_SIZE = 40;
const GRID_W = 20; // Larger Grid
const GRID_H = 12;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = "PLAYING";
let hasKey = false;
let frameCount = 0;

// Tile ID Map: 0:Path, 1:Tree, 2:Foliage, 3:Stone, 4:Door, 5:Water, 6:Key
const sprites = {};
function createArcadeSprites() {
    const sCanvas = document.createElement('canvas');
    const sCtx = sCanvas.getContext('2d');
    sCanvas.width = 40; sCanvas.height = 40;

    const drawToSprite = (name, drawFn) => {
        sCtx.clearRect(0,0,40,40);
        drawFn(sCtx);
        const img = new Image();
        img.src = sCanvas.toDataURL();
        sprites[name] = img;
    };

    drawToSprite('tree', c => { c.fillStyle='#0a2e0a'; c.fillRect(0,0,40,40); c.fillStyle='#1b4d1b'; c.fillRect(5,5,30,30); });
    drawToSprite('foliage', c => { c.fillStyle='#3d6e3d'; c.fillRect(0,0,40,40); c.fillStyle='#2d5a27'; for(let i=0;i<5;i++) c.fillRect(Math.random()*30,Math.random()*30,4,10); });
    drawToSprite('stone', c => { c.fillStyle='#555'; c.beginPath(); c.arc(20,22,18,0,7); c.fill(); c.fillStyle='#888'; c.beginPath(); c.arc(16,16,8,0,7); c.fill(); });
    drawToSprite('water', c => { c.fillStyle='#1e90ff'; c.fillRect(0,0,40,40); c.fillStyle='#afeeee'; c.fillRect(0,10,40,2); c.fillRect(0,25,40,2); });
    drawToSprite('key', c => { c.fillStyle='#ffd700'; c.fillRect(15,10,10,20); c.fillRect(10,10,20,5); });
    drawToSprite('hero', c => { c.fillStyle='#ffdbac'; c.fillRect(12,5,16,14); c.fillStyle='#83502e'; c.fillRect(10,20,20,15); c.fillStyle='#63391d'; c.fillRect(5,5,30,5); });
    drawToSprite('snake', c => { c.fillStyle='#32cd32'; c.fillRect(5,25,30,10); c.fillStyle='#ff0000'; c.fillRect(32,27,5,2); });
}
createArcadeSprites();

// Physics & Logic
function movePlayer(dx, dy) {
    if (gameState !== "PLAYING") return;
    let nx = player.x + dx, ny = player.y + dy;
    let target = level[ny][nx];

    if (target === 1 || target === 5) return; // Wall or Water
    if (target === 3 && dy === 0) { // Push stone
        if (level[ny][nx+dx] === 0) { level[ny][nx+dx]=3; level[ny][nx]=0; } else return;
    } else if (target === 3) return;

    if (target === 4) {
        if(hasKey) gameState = "WIN";
        else return;
    }
    if (target === 6) { hasKey = true; level[ny][nx] = 0; }

    level[ny][nx] = 0; player.x = nx; player.y = ny;
}

function update() {
    if (gameState !== "PLAYING") return;
    frameCount++;

    // Stone Physics
    for (let y = GRID_H - 2; y >= 0; y--) {
        for (let x = 0; x < GRID_W; x++) {
            if (level[y][x] === 3 && level[y+1][x] === 0) {
                level[y][x] = 0; level[y+1][x] = 3;
                if (player.x === x && player.y === y + 1) gameState = "GAMEOVER";
            }
        }
    }

    // Snake AI
    if (frameCount % 10 === 0) {
        enemies.forEach(s => {
            let nextX = s.x + s.dir;
            if (level[s.y][nextX] === 0) s.x = nextX;
            else s.dir *= -1;
            if (s.x === player.x && s.y === player.y) gameState = "GAMEOVER";
        });
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
            let t = level[y][x];
            let px = x * TILE_SIZE, py = y * TILE_SIZE;
            if (t === 1) ctx.drawImage(sprites.tree, px, py);
            if (t === 2) ctx.drawImage(sprites.foliage, px, py);
            if (t === 3) ctx.drawImage(sprites.stone, px, py);
            if (t === 5) ctx.drawImage(sprites.water, px, py);
            if (t === 6) ctx.drawImage(sprites.key, px, py);
            if (t === 4) { ctx.fillStyle = hasKey ? "#00ff00" : "#ff0000"; ctx.fillRect(px+5, py+5, 30, 30); }
        }
    }
    enemies.forEach(s => ctx.drawImage(sprites.snake, s.x * TILE_SIZE, s.y * TILE_SIZE));
    ctx.drawImage(sprites.hero, player.x * TILE_SIZE, player.y * TILE_SIZE);

    if (gameState === "GAMEOVER") {
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white"; ctx.textAlign="center"; ctx.fillText("CRUSHED! CLICK TO RESTART", canvas.width/2, canvas.height/2);
    }
    if (gameState === "WIN") {
        ctx.fillStyle = "rgba(0,50,0,0.9)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white"; ctx.textAlign="center"; ctx.fillText("HOSTAGE SAVED! (Next Level Coming Soon)", canvas.width/2, canvas.height/2);
    }
}

// Input
window.addEventListener('keydown', e => {
    if(e.key.includes('Arrow')) movePlayer(e.key==='ArrowRight'?1:e.key==='ArrowLeft'?-1:0, e.key==='ArrowDown'?1:e.key==='ArrowUp'?-1:0);
});
canvas.addEventListener('mousedown', () => { if(gameState!=="PLAYING") location.reload(); });

function resize() {
    canvas.width = 800; canvas.height = 480;
    let scale = Math.min(window.innerWidth/800, window.innerHeight/480);
    canvas.style.width = (800 * scale) + "px"; canvas.style.height = (480 * scale) + "px";
}
window.onresize = resize; resize();
setInterval(() => { update(); draw(); }, 100);
</script>

<!-- Link your level file here -->
<script src="level1.js"></script>
</body>
</html>
