<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Transfer Client</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h2 { color: #0056b3; }
        
        #reader {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .status-box {
            margin: 20px auto;
            padding: 15px;
            border-radius: 8px;
            background: #fff;
            max-width: 400px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-weight: bold;
        }

        /* UI Actions - Hidden by default */
        #actions {
            display: none; 
            margin-top: 30px;
        }

        .action-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-receive { background: #28a745; }
        
        input[type="file"] {
            width: 100%;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <h2>📱 Phone Connect</h2>
    
    <div id="reader"></div>

    <div class="status-box" id="statusText">🔴 Waiting for QR Scan...</div>

    <div id="actions">
        <div class="action-card">
            <h3>⬆️ Send to PC</h3>
            <input type="file" id="fileInput">
            <button class="btn" id="sendBtn" disabled>Send File</button>
            <p id="uploadStatus" style="font-size: 14px; color: gray;"></p>
        </div>

        <div class="action-card">
            <h3>⬇️ Receive from PC</h3>
            <button class="btn btn-receive" id="recvBtn">Download File</button>
        </div>
    </div>

    <script>
        let pcServerUrl = "";
        let html5QrcodeScanner = null;

        // 1. Initialize the QR Scanner
        function startScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        // 2. When a QR code is successfully read
        function onScanSuccess(decodedText, decodedResult) {
            console.log(`Scan result: ${decodedText}`);
            
            // Stop scanning to save battery and hide the camera view
            html5QrcodeScanner.clear();
            document.getElementById('reader').style.display = 'none';
            
            pcServerUrl = decodedText;
            document.getElementById('statusText').innerText = "🟡 Connecting to PC...";

            // 3. Perform Handshake
            performHandshake();
        }

        function onScanFailure(error) {
            // Silently handle read failures (happens every frame until a code is found)
        }

        // 4. The Handshake Logic
        function performHandshake() {
            // We use an OPTIONS request to the /upload endpoint. 
            // It's a lightweight way to check if the server is alive without sending data.
            fetch(pcServerUrl + '/upload', {
                method: 'OPTIONS'
            })
            .then(response => {
                if (response.ok || response.status === 204) {
                    // Handshake Success!
                    document.getElementById('statusText').innerText = "🟢 Connected securely to PC!";
                    document.getElementById('statusText').style.color = "green";
                    
                    // Reveal the UI actions
                    document.getElementById('actions').style.display = 'block';
                } else {
                    throw new Error("Server responded, but not successfully.");
                }
            })
            .catch(error => {
                console.error("Handshake failed:", error);
                document.getElementById('statusText').innerText = "🔴 Handshake Failed. Make sure PC and Phone are on the same Wi-Fi.";
                document.getElementById('statusText').style.color = "red";
            });
        }

        // 5. Enable Send Button only when a file is selected
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const btn = document.getElementById('sendBtn');
            btn.disabled = !e.target.files.length;
        });

        // 6. Upload File Logic
        document.getElementById('sendBtn').addEventListener('click', function() {
            let fileInput = document.getElementById('fileInput');
            let file = fileInput.files[0];
            if (!file) return;

            let statusEl = document.getElementById('uploadStatus');
            statusEl.innerText = "Uploading...";
            this.disabled = true;

            // Send raw file bytes to the Java API
            fetch(pcServerUrl + '/upload?name=' + encodeURIComponent(file.name), {
                method: 'POST',
                body: file
            })
            .then(response => response.json()) // We expect the JSON {"status": "success"} from Java
            .then(data => {
                if(data.status === "success") {
                    statusEl.innerText = "✅ File Sent Successfully!";
                    statusEl.style.color = "green";
                    fileInput.value = ""; // Clear input
                } else {
                    throw new Error("Upload failed.");
                }
            })
            .catch(error => {
                statusEl.innerText = "❌ Upload Failed.";
                statusEl.style.color = "red";
                this.disabled = false;
            });
        });

        // 7. Download File Logic
        document.getElementById('recvBtn').addEventListener('click', function() {
            // The simplest way to trigger a download is to redirect the browser to the file endpoint
            window.location.href = pcServerUrl + '/download';
        });

        // Start the scanner when the page loads
        window.onload = startScanner;
    </script>
</body>
</html>
